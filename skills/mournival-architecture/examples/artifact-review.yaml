  findings:
    - finding_id: F-001
      type: missing_gate
      description: Productive-use gate is not documented.
      severity: medium
  required_actions:
    - Add release gate section.
  allowed_next_steps:
    - rework
  blocked_next_steps:
    - publish_final

risk_steward_review:
  role_name: architecture_risk_steward
  verdict: accepted_with_conditions
  confidence: 0.69
  risk_level: medium
  rationale: Guidance could be applied outside intended system boundary.
  findings:
    - finding_id: F-002
      type: boundary_risk
      description: Scope boundary is implicit.
      severity: medium
  required_actions:
    - Add explicit system boundary.
  allowed_next_steps:
    - stakeholder_review
  blocked_next_steps:
    - cross_domain_reuse

value_steward_review:
