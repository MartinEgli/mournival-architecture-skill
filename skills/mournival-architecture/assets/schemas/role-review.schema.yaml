type: object
required:
  - role_name
  - verdict
  - confidence
  - risk_level
  - rationale
  - findings
  - required_actions
  - allowed_next_steps
  - blocked_next_steps
properties:
  role_name:
    type: string
    enum:
      - architecture_decision_steward
      - architecture_risk_steward
      - architecture_value_steward
      - architecture_assurance_steward
  verdict:
    type: string
    enum:
      - accepted
      - accepted_with_conditions
      - blocked
      - requires_human_review
      - rejected
  confidence:
    type: number
    minimum: 0
    maximum: 1
  risk_level:
    type: string
    enum:
      - low
      - medium
      - high
      - critical
  rationale:
    type: string
  findings:
    type: array
    items:
      $ref: ./finding.schema.yaml
  required_actions:
    type: array
    items:
      type: string
  allowed_next_steps:
    type: array
    items:
      type: string
  blocked_next_steps:
    type: array
    items:
      type: string
